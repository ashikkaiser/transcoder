<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
    <div class="bg-surface-100 rounded-xl border border-gray-800/60 p-5">
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Total Jobs</p>
        <p class="text-3xl font-bold text-white mt-2">{{ stats.total }}</p>
    </div>
    <div class="bg-surface-100 rounded-xl border border-gray-800/60 p-5">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-blue-400 status-pulse"></span>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Active</p>
        </div>
        <p class="text-3xl font-bold text-blue-400 mt-2">{{ stats.active }}</p>
    </div>
    <div class="bg-surface-100 rounded-xl border border-gray-800/60 p-5">
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Completed</p>
        <p class="text-3xl font-bold text-emerald-400 mt-2">{{ stats.completed }}</p>
    </div>
    <div class="bg-surface-100 rounded-xl border border-gray-800/60 p-5">
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Failed</p>
        <p class="text-3xl font-bold text-red-400 mt-2">{{ stats.failed }}</p>
    </div>
</div>
